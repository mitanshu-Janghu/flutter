name: smartvidya
description: SmartVidya Learning App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.10.5
  google_mlkit_face_detection: ^0.10.0
  tflite_flutter: ^0.11.0
  image: ^4.1.7
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  flutter_local_notifications: ^17.0.0
shared_preferences: ^2.2.2
dev_dependencies:
  flutter_test:
   sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/emotion_model.tflite

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
